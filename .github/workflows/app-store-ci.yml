name: App Store artifact validation

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: zsh {0}

jobs:
  store-artifact:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.16.0

      - name: Build Native SDK CLI from vendored fork
        run: cd vendor/native && zig build cli

      - name: Verify Store runtime contract
        run: tests/app-store-contract

      - name: Build and audit credential-free Store-shaped package
        run: scripts/release-app-store --ci

      - name: Upload inspected package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: token-tach-store-shaped-${{ github.run_number }}-${{ github.run_attempt }}
          path: zig-out/package/*-mac-app-store-ci.pkg
          if-no-files-found: error
          retention-days: 7
