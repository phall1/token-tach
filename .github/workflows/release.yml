name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag (for example, v0.3.2)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  verify:
    name: Verify tagged commit
    runs-on: macos-15
    outputs:
      version: ${{ steps.tag.outputs.version }}
      commit: ${{ steps.tag.outputs.commit }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}
          fetch-depth: 0
          submodules: recursive

      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.16.0

      - name: Build Native SDK CLI from vendored fork
        run: cd vendor/native && zig build cli

      - name: Validate exact tag and version
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          [[ "$RELEASE_TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]] || {
            echo "Release tag must be canonical vMAJOR.MINOR.PATCH" >&2
            exit 1
          }
          version="$(perl -ne 'print "$1\n" if /^\s*\.version\s*=\s*"([^"]+)"\s*,\s*$/' app.zon)"
          [[ -n "$version" && "$(printf '%s\n' "$version" | wc -l | tr -d ' ')" == 1 ]] || {
            echo "Could not read exactly one canonical version from app.zon" >&2
            exit 1
          }
          [[ "$RELEASE_TAG" == "v$version" ]] || {
            echo "Tag $RELEASE_TAG does not match app.zon version $version" >&2
            exit 1
          }
          tag_commit="$(git rev-list -n 1 "refs/tags/$RELEASE_TAG")"
          head_commit="$(git rev-parse HEAD)"
          [[ "$head_commit" == "$tag_commit" ]] || {
            echo "Checkout $head_commit is not tagged commit $tag_commit" >&2
            exit 1
          }
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "commit=$head_commit" >> "$GITHUB_OUTPUT"

      - name: Verify source
        run: scripts/verify

  release:
    name: Build and publish
    needs: verify
    runs-on: macos-15
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.verify.outputs.commit }}
          fetch-depth: 0
          submodules: recursive

      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.16.0

      - name: Build Native SDK CLI from vendored fork
        run: cd vendor/native && zig build cli

      - name: Revalidate immutable source
        shell: bash
        env:
          EXPECTED_COMMIT: ${{ needs.verify.outputs.commit }}
          EXPECTED_VERSION: ${{ needs.verify.outputs.version }}
        run: |
          set -euo pipefail
          [[ "$(git rev-parse HEAD)" == "$EXPECTED_COMMIT" ]]
          [[ "$(git rev-list -n 1 "refs/tags/$RELEASE_TAG")" == "$EXPECTED_COMMIT" ]]
          [[ "$RELEASE_TAG" == "v$EXPECTED_VERSION" ]]

      - name: Build and validate Universal 2 ad-hoc release
        shell: bash
        run: |
          set -euo pipefail
          scripts/release --skip-verify --universal

      - name: Stage release artifacts and checksums
        shell: bash
        env:
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist
          dmgs=(zig-out/package/*.dmg)
          [[ ${#dmgs[@]} == 1 && -f "${dmgs[0]}" ]]
          cp "${dmgs[0]}" "dist/token-tach-$VERSION-universal2.dmg"
          (cd dist && shasum -a 256 "token-tach-$VERSION-universal2.dmg" > SHA256SUMS)
          (cd dist && shasum -a 256 -c SHA256SUMS)

      - name: Attest release artifacts
        if: github.event.repository.visibility == 'public'
        id: attest
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-path: |
            dist/*.dmg
            dist/SHA256SUMS

      - name: Include provenance bundle
        if: github.event.repository.visibility == 'public'
        shell: bash
        env:
          BUNDLE_PATH: ${{ steps.attest.outputs.bundle-path }}
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          set -euo pipefail
          [[ -s "$BUNDLE_PATH" ]]
          cp "$BUNDLE_PATH" "dist/token-tach-$VERSION.intoto.jsonl"

      - name: Upload immutable workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: token-tach-${{ needs.verify.outputs.version }}-${{ needs.verify.outputs.commit }}
          path: dist/
          if-no-files-found: error
          retention-days: 90

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists; refusing to mutate it" >&2
            exit 1
          fi
          gh release create "$RELEASE_TAG" dist/* \
            --verify-tag --title "Token Tach $VERSION" --generate-notes

      - name: Update Homebrew tap
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          set -euo pipefail
          if [[ -z "$GH_TOKEN" ]]; then
            echo "HOMEBREW_TAP_TOKEN is unset; the tap's hourly release poll will update the cask."
            exit 0
          fi
          sha256="$(shasum -a 256 "dist/token-tach-$VERSION-universal2.dmg" | cut -d ' ' -f 1)"
          gh api --method POST repos/phall1/homebrew-tap/dispatches \
            -f event_type=token-tach-release \
            -F "client_payload[version]=$VERSION" \
            -F "client_payload[sha256]=$sha256"
