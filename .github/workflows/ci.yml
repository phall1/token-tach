name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.16.0

      - name: Format check
        run: zig fmt --check src build.zig build.zig.zon

      - name: Build Native SDK CLI from vendored fork
        run: cd vendor/native && zig build cli

      - name: Verify
        run: scripts/verify

      - name: Upload smoke screenshot
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: smoke-screenshot
          path: .zig-cache/native-sdk-automation/screenshot-*.png
          if-no-files-found: ignore
