name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Format check
        run: zig fmt --check src build.zig build.zig.zon

      - name: Install Native SDK CLI
        run: npm install -g @native-sdk/cli@0.4.0

      - name: Verify
        run: scripts/verify

      - name: Upload smoke screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-screenshot
          path: screenshot-*.png
          if-no-files-found: ignore
