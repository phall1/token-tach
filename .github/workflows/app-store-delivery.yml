name: App Store delivery

on:
  workflow_dispatch:
    inputs:
      testflight_group:
        description: Optional internal TestFlight group name
        required: false
        type: string

permissions:
  contents: read

defaults:
  run:
    shell: zsh {0}

jobs:
  upload:
    runs-on: macos-15
    environment: app-store-delivery
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.16.0

      - name: Build Native SDK CLI from vendored fork
        run: cd vendor/native && zig build cli

      - name: Install signing assets in an ephemeral keychain
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_DISTRIBUTION_CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.MACOS_APP_STORE_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_CI_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          : "${CERTIFICATE_P12_BASE64:?missing distribution certificate}"
          : "${CERTIFICATE_PASSWORD:?missing certificate password}"
          : "${PROVISIONING_PROFILE_BASE64:?missing provisioning profile}"
          : "${KEYCHAIN_PASSWORD:?missing keychain password}"
          CERTIFICATE="$RUNNER_TEMP/distribution.p12"
          PROFILE="$RUNNER_TEMP/token-tach.provisionprofile"
          KEYCHAIN="$RUNNER_TEMP/app-store.keychain-db"
          print -rn -- "$CERTIFICATE_P12_BASE64" | base64 --decode > "$CERTIFICATE"
          print -rn -- "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERTIFICATE" -k "$KEYCHAIN" -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          chmod 600 "$PROFILE"
          print "PROFILE=$PROFILE" >> "$GITHUB_ENV"
          print "KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"

      - name: Materialize App Store Connect API key outside checkout
        env:
          API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          : "${API_PRIVATE_KEY:?missing App Store Connect API private key}"
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8"
          print -rn -- "$API_PRIVATE_KEY" > "$API_KEY_PATH"
          chmod 600 "$API_KEY_PATH"
          print "APP_STORE_CONNECT_API_KEY_PATH=$API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Build, sign, audit, upload, and monitor
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_APP_ID: ${{ vars.APP_STORE_CONNECT_APP_ID }}
          TESTFLIGHT_GROUP: ${{ inputs.testflight_group }}
        run: scripts/release-app-store --profile "$PROFILE" --upload --testflight-group "$TESTFLIGHT_GROUP"

      - name: Remove ephemeral keychain
        if: always()
        run: security delete-keychain "$KEYCHAIN" 2>/dev/null || true

  production-review-checkpoint:
    needs: upload
    runs-on: macos-15
    environment: app-store-production-review
    steps:
      - name: Record protected approval
        run: |
          print 'Protected production-review approval received.'
          print 'No automated review submission is performed.'
          print 'Verify metadata, compliance, screenshots, phased release, and the selected build in App Store Connect, then submit manually.'
